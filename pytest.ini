[pytest]
# Configuración de pytest

# Directorios de búsqueda de tests
testpaths = tests

# Patrones de búsqueda
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Reportes
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Marcadores personalizados
markers =
    slow: tests que son lentos
    integration: tests de integración
    requires_dataset: tests que requieren dataset descargado
    unit: tests unitarios

# Ignorar ciertos patrones
norecursedirs = .git .venv venv env

# Opciones de coverage
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
